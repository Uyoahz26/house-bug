name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      D1_DATABASE_NAME: homebug-db
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
      COMPATIBILITY_DATE: 2024-04-18

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build Cloudflare Pages output
        run: npm run build:pages

      - name: Create Wrangler config for CI
        run: |
          set -e
          if [ -z "$CLOUDFLARE_D1_DATABASE_ID" ]; then
            echo "Missing required secret: CLOUDFLARE_D1_DATABASE_ID"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_PAGES_PROJECT" ]; then
            echo "Missing required secret: CLOUDFLARE_PAGES_PROJECT"
            exit 1
          fi

          cat > wrangler.toml <<EOF
          name = "$CLOUDFLARE_PAGES_PROJECT"
          compatibility_date = "2024-04-18"
          compatibility_flags = ["nodejs_compat"]
          pages_build_output_dir = ".vercel/output/static"

          [[d1_databases]]
          binding = "DB"
          database_name = "$D1_DATABASE_NAME"
          database_id = "$CLOUDFLARE_D1_DATABASE_ID"
          migrations_dir = "migrations"
          EOF

      - name: Apply D1 migrations (auto detect)
        run: npx wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote

      - name: Ensure Pages project exists
        run: |
          set -e
          API_BASE="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects"
          STATUS=$(curl -sS -o /tmp/pages_project_get.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "$API_BASE/$CLOUDFLARE_PAGES_PROJECT")

          if [ "$STATUS" = "200" ]; then
            echo "Pages project exists: $CLOUDFLARE_PAGES_PROJECT"
            exit 0
          fi

          if [ "$STATUS" != "404" ]; then
            echo "Failed to query Pages project (status=$STATUS)."
            cat /tmp/pages_project_get.json
            exit 1
          fi

          echo "Pages project not found, creating: $CLOUDFLARE_PAGES_PROJECT"
          CREATE_STATUS=$(curl -sS -o /tmp/pages_project_create.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "$API_BASE" \
            --data "{\"name\":\"$CLOUDFLARE_PAGES_PROJECT\",\"production_branch\":\"main\",\"deployment_configs\":{\"preview\":{\"compatibility_date\":\"$COMPATIBILITY_DATE\",\"compatibility_flags\":[\"nodejs_compat\"]},\"production\":{\"compatibility_date\":\"$COMPATIBILITY_DATE\",\"compatibility_flags\":[\"nodejs_compat\"]}}}")

          if [ "$CREATE_STATUS" != "200" ]; then
            echo "Failed to create Pages project (status=$CREATE_STATUS)."
            cat /tmp/pages_project_create.json
            exit 1
          fi

          echo "Pages project created successfully."

      - name: Enforce Pages compatibility flags
        run: |
          set -e
          API_BASE="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects"

          PATCH_STATUS=$(curl -sS -o /tmp/pages_project_patch.json -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "$API_BASE/$CLOUDFLARE_PAGES_PROJECT" \
            --data "{\"deployment_configs\":{\"preview\":{\"compatibility_date\":\"$COMPATIBILITY_DATE\",\"compatibility_flags\":[\"nodejs_compat\"]},\"production\":{\"compatibility_date\":\"$COMPATIBILITY_DATE\",\"compatibility_flags\":[\"nodejs_compat\"]}}}")

          if [ "$PATCH_STATUS" != "200" ]; then
            echo "Failed to enforce Pages compatibility flags (status=$PATCH_STATUS)."
            cat /tmp/pages_project_patch.json
            exit 1
          fi

          echo "Pages compatibility flags enforced: nodejs_compat"

      - name: Deploy Pages
        run: npx wrangler pages deploy .vercel/output/static --project-name "$CLOUDFLARE_PAGES_PROJECT" --commit-dirty=true
